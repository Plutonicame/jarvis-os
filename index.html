<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#000d22"/>
<link rel="manifest" href="manifest.json"/>
<title>Jarvis OS</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000d22;--blue:#00aaff;--blue2:#33ccff;
  --border:rgba(0,170,255,0.15);--text:#c8e8ff;--muted:rgba(0,170,255,0.4);
  --mono:'Courier New',monospace;--sans:'Inter',system-ui,sans-serif;
  --danger:#ff4444;--success:#00ff88;
}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(0,140,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,140,255,.05) 1px,transparent 1px);background-size:48px 48px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* TOPBAR */
#topbar{position:fixed;top:0;left:0;right:0;height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(0,10,28,.9);border-bottom:1px solid var(--border);backdrop-filter:blur(10px);z-index:100}
.tb-logo{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--blue2);letter-spacing:3px}
#tb-right{display:flex;align-items:center;gap:14px}
#sync-indicator{font-size:9px;font-family:var(--mono);letter-spacing:1px;color:var(--muted);display:flex;align-items:center;gap:5px}
#sync-dot{width:5px;height:5px;border-radius:50%;background:#ff6600;box-shadow:0 0 5px #ff6600;flex-shrink:0}
#user-btn{display:flex;align-items:center;gap:7px;cursor:pointer;padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:11px;font-family:var(--mono);letter-spacing:1px;transition:all .2s}
#user-btn:hover{border-color:var(--blue);color:var(--blue2);background:rgba(0,170,255,.07)}
.user-avatar{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#0055aa);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden}
.user-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}

/* DROPDOWN */
#user-dropdown{display:none;position:fixed;top:52px;right:16px;background:rgba(0,12,36,.97);border:1px solid var(--border);border-radius:10px;min-width:210px;z-index:300;box-shadow:0 8px 30px rgba(0,0,0,.7);overflow:hidden;animation:fadeIn .15s ease}
#user-dropdown.open{display:block}
.ud-header{padding:14px 16px;border-bottom:1px solid var(--border)}
.ud-name{font-size:12px;font-weight:600;color:var(--blue2)}
.ud-email{font-size:10px;color:var(--muted);margin-top:2px;font-family:var(--mono)}
.ud-item{padding:10px 16px;font-size:11px;color:var(--text);cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:8px}
.ud-item:hover{background:rgba(0,170,255,.1);color:var(--blue2)}
.ud-item.danger:hover{background:rgba(255,60,60,.08);color:var(--danger)}
.ud-sep{height:1px;background:var(--border);margin:4px 0}

/* LAYOUT */
#app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:48px;gap:10px}
#hud-wrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%;min-height:0;padding:8px 0 0}
#jarvis-center{position:relative}
#jarvis-center canvas{display:block}
#state-label{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--muted);pointer-events:none;white-space:nowrap}

/* BOUTONS ÉTAT */
#state-btns{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;flex-shrink:0;padding-bottom:4px}
.state-btn{padding:4px 13px;border-radius:20px;font-size:10px;font-family:var(--mono);letter-spacing:1px;cursor:pointer;transition:all .2s;background:transparent;border:1px solid rgba(0,170,255,.18);color:var(--muted)}
.state-btn:hover,.state-btn.active{background:rgba(0,170,255,.1);border-color:var(--blue);color:var(--blue2);box-shadow:0 0 8px rgba(0,170,255,.12)}

/* MODULES */
#modules-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:center;flex-shrink:0;padding-bottom:12px}
.module-slot{width:150px;height:82px;border-radius:14px;border:1px solid var(--border);background:rgba(0,18,48,.5);backdrop-filter:blur(8px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:all .22s;position:relative;overflow:visible}
.module-slot.loaded:hover{border-color:rgba(0,170,255,.45);box-shadow:0 0 16px rgba(0,170,255,.1);transform:translateY(-2px);cursor:pointer}
.module-slot.inactive{opacity:.45}
.mod-icon{font-size:19px;line-height:1}
.mod-name{font-size:11px;font-weight:600;color:var(--text);letter-spacing:.3px}
.mod-sub{font-size:9px;color:var(--muted);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mod-status-badge{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);font-size:7px;font-family:var(--mono);letter-spacing:1px;padding:1px 6px;border-radius:6px}
.mod-status-badge.active{background:rgba(0,255,136,.08);color:var(--success);border:1px solid rgba(0,255,136,.2)}
.mod-status-badge.inactive{background:rgba(255,100,0,.08);color:#ff8844;border:1px solid rgba(255,100,0,.2)}
.mod-menu-btn{position:absolute;top:6px;right:7px;width:20px;height:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2.5px;cursor:pointer;opacity:.35;transition:opacity .2s;z-index:10}
.mod-menu-btn:hover{opacity:1}
.mod-menu-btn span{width:3px;height:3px;border-radius:50%;background:var(--blue2);display:block}
.mod-menu{display:none;position:absolute;top:26px;right:4px;background:rgba(0,15,40,.97);border:1px solid var(--border);border-radius:8px;overflow:hidden;z-index:200;min-width:170px;box-shadow:0 4px 20px rgba(0,0,0,.6)}
.mod-menu.open{display:block}
.mod-menu-item{padding:9px 14px;font-size:11px;color:var(--text);cursor:pointer;transition:background .15s;white-space:nowrap;display:flex;align-items:center;gap:8px}
.mod-menu-item:hover{background:rgba(0,170,255,.12);color:var(--blue2)}
.mod-menu-item.danger:hover{background:rgba(255,60,60,.1);color:#ff7070}
.mod-menu-sep{height:1px;background:var(--border);margin:4px 0}
.module-slot.add-slot{cursor:pointer}
.module-slot.add-slot:hover{border-color:rgba(0,170,255,.4);box-shadow:0 0 14px rgba(0,170,255,.08)}
.plus-circle{width:32px;height:32px;border-radius:50%;border:1.5px dashed rgba(0,170,255,.28);display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:300;color:rgba(0,170,255,.3);transition:all .22s}
.module-slot.add-slot:hover .plus-circle{border-color:var(--blue);color:var(--blue);box-shadow:0 0 12px rgba(0,170,255,.18);transform:scale(1.08)}
.plus-label{font-size:9px;font-family:var(--mono);letter-spacing:1px;color:rgba(0,170,255,.22);transition:color .2s}
.module-slot.add-slot:hover .plus-label{color:var(--blue)}

/* MODULE IFRAME */
#module-frame{display:none;position:fixed;inset:0;z-index:500;background:var(--bg);flex-direction:column}
#module-frame.open{display:flex}
#mf-bar{height:44px;display:flex;align-items:center;gap:12px;padding:0 18px;background:rgba(0,10,26,.95);border-bottom:1px solid var(--border);flex-shrink:0}
#mf-close{padding:4px 11px;border-radius:6px;font-size:10px;font-family:var(--mono);letter-spacing:1px;background:rgba(0,170,255,.07);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .18s}
#mf-close:hover{background:rgba(255,50,50,.1);border-color:rgba(255,60,60,.4);color:#ff7070}
#mf-title{font-family:var(--mono);font-size:11px;color:var(--blue2);letter-spacing:2px}
#module-iframe{flex:1;border:none;width:100%;background:#000}
#file-input{display:none}

/* AUTH OVERLAY */
#auth-overlay{display:flex;position:fixed;inset:0;z-index:1000;background:rgba(0,5,18,.97);backdrop-filter:blur(16px);align-items:center;justify-content:center}
#auth-overlay.hidden{display:none}
.auth-box{width:100%;max-width:360px;padding:40px 32px;background:rgba(0,10,30,.98);border:1px solid var(--border);border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.9),0 0 60px rgba(0,80,255,.05);margin:16px;animation:fadeIn .3s ease}
.auth-logo{font-family:var(--mono);font-size:24px;font-weight:700;color:var(--blue2);letter-spacing:5px;text-align:center;margin-bottom:4px}
.auth-tagline{font-size:10px;color:var(--muted);text-align:center;font-family:var(--mono);letter-spacing:2px;margin-bottom:32px}
.auth-divider{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-divider span{font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:1px;white-space:nowrap}

/* Bouton Google */
.google-btn{
  width:100%;padding:13px 16px;border-radius:10px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.12);
  color:#e8eaed;font-size:13px;font-family:var(--sans);
  font-weight:500;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:12px;
  letter-spacing:.3px;
}
.google-btn:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.22);box-shadow:0 4px 20px rgba(0,0,0,.4);transform:translateY(-1px)}
.google-btn:active{transform:translateY(0)}
.google-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.google-icon{width:18px;height:18px;flex-shrink:0}

/* Séparateur + email optionnel */
.auth-or{text-align:center;font-size:10px;font-family:var(--mono);color:var(--muted);letter-spacing:1px;margin:20px 0 16px}
.auth-field{margin-bottom:12px}
.auth-field label{display:block;font-size:10px;font-family:var(--mono);letter-spacing:1px;color:var(--muted);margin-bottom:5px}
.auth-field input{width:100%;padding:10px 14px;background:rgba(0,20,60,.6);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;transition:border-color .2s}
.auth-field input:focus{border-color:var(--blue)}
.auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:18px}
.auth-tab{flex:1;padding:7px;text-align:center;font-size:10px;font-family:var(--mono);letter-spacing:1px;cursor:pointer;color:var(--muted);transition:all .2s;border-bottom:2px solid transparent;margin-bottom:-1px}
.auth-tab.active{color:var(--blue2);border-bottom-color:var(--blue)}
.auth-btn{width:100%;padding:11px;border-radius:8px;background:linear-gradient(135deg,rgba(0,100,220,.7),rgba(0,60,160,.7));border:1px solid rgba(0,170,255,.3);color:var(--blue2);font-size:12px;font-family:var(--mono);letter-spacing:2px;cursor:pointer;transition:all .2s;margin-top:4px}
.auth-btn:hover{background:linear-gradient(135deg,rgba(0,130,255,.8),rgba(0,80,200,.8));box-shadow:0 0 20px rgba(0,150,255,.2)}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-msg{font-size:11px;font-family:var(--mono);text-align:center;padding:9px 12px;border-radius:7px;margin-bottom:14px;display:none;line-height:1.5}
.auth-msg.error{color:var(--danger);background:rgba(255,0,0,.06);border:1px solid rgba(255,0,0,.15);display:block}
.auth-msg.success{color:var(--success);background:rgba(0,255,136,.06);border:1px solid rgba(0,255,136,.15);display:block}
.auth-msg.info{color:var(--blue2);background:rgba(0,150,255,.06);border:1px solid rgba(0,150,255,.15);display:block}
.auth-link{text-align:center;margin-top:12px;font-size:10px;color:var(--muted);cursor:pointer}
.auth-link span{color:var(--blue);text-decoration:underline}
.auth-loading-spinner{width:20px;height:20px;border:2px solid rgba(0,170,255,.2);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 8px}

/* PARAMÈTRES */
#settings-panel{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,5,18,.95);backdrop-filter:blur(12px);flex-direction:column}
#settings-panel.open{display:flex}
#sp-bar{height:44px;display:flex;align-items:center;gap:12px;padding:0 18px;background:rgba(0,10,26,.95);border-bottom:1px solid var(--border);flex-shrink:0}
#sp-close{padding:4px 11px;border-radius:6px;font-size:10px;font-family:var(--mono);letter-spacing:1px;background:rgba(0,170,255,.07);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .18s}
#sp-close:hover{background:rgba(255,50,50,.1);border-color:rgba(255,60,60,.4);color:#ff7070}
#sp-title{font-family:var(--mono);font-size:11px;color:var(--blue2);letter-spacing:2px}
#sp-content{flex:1;overflow-y:auto;padding:24px;max-width:600px;margin:0 auto;width:100%}
.sp-section{margin-bottom:28px}
.sp-section-title{font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--muted);border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:14px}
.sp-field{margin-bottom:12px}
.sp-field label{display:block;font-size:11px;color:var(--text);margin-bottom:5px}
.sp-field input{width:100%;padding:9px 12px;background:rgba(0,20,60,.6);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;outline:none}
.sp-field input:focus{border-color:var(--blue)}
.sp-field input:disabled{opacity:.5}
.sp-save-btn{padding:9px 20px;border-radius:7px;font-size:11px;font-family:var(--mono);background:rgba(0,100,220,.3);border:1px solid rgba(0,170,255,.3);color:var(--blue2);cursor:pointer;letter-spacing:1px;transition:all .2s}
.sp-save-btn:hover{background:rgba(0,130,255,.4)}

/* CONFIRM */
#confirm-modal{display:none;position:fixed;inset:0;z-index:700;background:rgba(0,5,18,.85);backdrop-filter:blur(8px);align-items:center;justify-content:center}
#confirm-modal.visible{display:flex}
.confirm-box{background:rgba(0,12,36,.98);border:1px solid var(--border);border-radius:12px;padding:24px 28px;max-width:340px;width:90%;box-shadow:0 10px 40px rgba(0,0,0,.7)}
.confirm-title{font-size:13px;font-weight:600;color:var(--blue2);margin-bottom:10px;font-family:var(--mono)}
.confirm-msg{font-size:12px;color:var(--text);margin-bottom:20px;line-height:1.6}
.confirm-btns{display:flex;gap:10px;justify-content:flex-end}
.confirm-cancel{padding:7px 16px;border-radius:6px;font-size:11px;font-family:var(--mono);background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer}
.confirm-ok{padding:7px 16px;border-radius:6px;font-size:11px;font-family:var(--mono);background:rgba(255,40,40,.15);border:1px solid rgba(255,60,60,.3);color:#ff7070;cursor:pointer}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:rgba(0,15,40,.97);border:1px solid var(--border);border-radius:8px;padding:10px 20px;font-size:11px;font-family:var(--mono);color:var(--text);z-index:800;transition:transform .3s ease;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.6)}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.success{border-color:rgba(0,255,136,.3);color:var(--success)}
#toast.error{border-color:rgba(255,60,60,.3);color:var(--danger)}

@media(max-width:600px){.module-slot{width:130px;height:74px}.auth-box{padding:28px 18px}}
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div class="tb-logo">
    <img src="icon-192.png" alt="Jarvis OS" style="height:32px;width:32px;border-radius:7px;object-fit:cover;display:block"/>
  </div>
  <div id="tb-right">
    <div id="sync-indicator">
      <div id="sync-dot"></div>
      <span id="sync-text">HORS LIGNE</span>
    </div>
    <div id="user-btn" onclick="toggleUserDropdown()">
      <div class="user-avatar" id="user-avatar">?</div>
      <span id="user-name">CONNEXION</span>
    </div>
  </div>
</div>

<!-- DROPDOWN -->
<div id="user-dropdown">
  <div class="ud-header">
    <div class="ud-name" id="dd-name">—</div>
    <div class="ud-email" id="dd-email">—</div>
  </div>
  <div class="ud-item" onclick="openSettings();closeDropdown()">⚙ Paramètres</div>
  <div class="ud-item" onclick="forceSync();closeDropdown()">↺ Synchroniser</div>
  <div class="ud-sep"></div>
  <div class="ud-item danger" onclick="doSignOut()">⏻ Déconnexion</div>
</div>

<!-- APP -->
<div id="app">
  <div id="hud-wrap">
    <div id="jarvis-center">
      <canvas id="hud"></canvas>
      <div id="state-label">EN LIGNE</div>
    </div>
  </div>
  <div id="state-btns">
    <button class="state-btn active" onclick="setState('online')">EN LIGNE</button>
    <button class="state-btn" onclick="setState('listening')">ÉCOUTE</button>
    <button class="state-btn" onclick="setState('working')">TRAVAILLE</button>
    <button class="state-btn" onclick="setState('speaking')">PARLE</button>
  </div>
  <div id="modules-row"></div>
</div>

<input type="file" id="file-input" accept=".html" onchange="loadModule(event)"/>

<!-- MODULE IFRAME -->
<div id="module-frame">
  <div id="mf-bar">
    <button id="mf-close" onclick="closeModule()">← RETOUR</button>
    <span id="mf-title">MODULE</span>
  </div>
  <iframe id="module-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
</div>

<!-- PARAMÈTRES -->
<div id="settings-panel">
  <div id="sp-bar">
    <button id="sp-close" onclick="closeSettings()">← RETOUR</button>
    <span id="sp-title">PARAMÈTRES</span>
  </div>
  <div id="sp-content">
    <div class="sp-section">
      <div class="sp-section-title">PROFIL</div>
      <div class="sp-field"><label>Nom d'affichage</label><input type="text" id="sp-display-name" placeholder="Ton nom"/></div>
      <button class="sp-save-btn" onclick="saveProfile()">Enregistrer</button>
    </div>
    <div class="sp-section">
      <div class="sp-section-title">COMPTE</div>
      <div class="sp-field"><label>Email</label><input type="text" id="sp-email" disabled/></div>
      <div class="sp-field"><label>Fournisseur</label><input type="text" id="sp-provider" disabled/></div>
    </div>
    <div class="sp-section">
      <div class="sp-section-title">DONNÉES</div>
      <button class="sp-save-btn" onclick="exportModules()" style="margin-right:8px">⬇ Exporter</button>
      <button class="sp-save-btn" onclick="document.getElementById('import-input').click()">⬆ Importer</button>
      <input type="file" id="import-input" accept=".json" style="display:none" onchange="importModules(event)"/>
    </div>
  </div>
</div>

<!-- AUTH OVERLAY — visible par défaut -->
<div id="auth-overlay">
  <div class="auth-box">
    <div class="auth-logo">JARVIS OS</div>
    <div class="auth-tagline">PLATEFORME MODULAIRE</div>

    <div id="auth-msg" class="auth-msg"></div>

    <!-- Bouton Google -->
    <button class="google-btn" id="google-btn" onclick="doGoogleLogin()">
      <!-- Icône Google SVG officielle -->
      <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continuer avec Google
    </button>

    <div class="auth-or">— OU —</div>

    <!-- Email / mot de passe -->
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">CONNEXION</div>
      <div class="auth-tab" id="tab-signup" onclick="switchTab('signup')">INSCRIPTION</div>
    </div>

    <div id="form-login">
      <div class="auth-field"><label>EMAIL</label><input type="email" id="login-email" placeholder="email@exemple.com" autocomplete="email"/></div>

<script>
// ══════════════════════════════════════════════
// HUD CANVAS — démarre immédiatement
// ══════════════════════════════════════════════
const canvas=document.getElementById('hud'),ctx=canvas.getContext('2d')
let W=0,H=0,cx=0,cy=0,t=0,jarvisState='online'
const NPART=200
let particles=[]
window.JARVIS={audioAmplitude:0}

function resizeHUD(){
  const wrap=document.getElementById('hud-wrap')
  const S=Math.max(180,Math.min(wrap.offsetHeight-24,wrap.offsetWidth-24))
  const el=document.getElementById('jarvis-center')
  el.style.width=S+'px';el.style.height=S+'px'
  canvas.width=S;canvas.height=S;W=S;H=S;cx=S/2;cy=S/2
  buildParticles()
}
function buildParticles(){
  const R=W*.30;particles=[]
  for(let i=0;i<NPART;i++){
    const ang=Math.random()*Math.PI*2,u=(i+Math.random())/NPART,dist=R*Math.sqrt(u)*.92
    const listenAng=(i/NPART)*Math.PI*2+(Math.random()-.5)*(Math.PI*2/NPART)*1.5
    const rnd=Math.random()
    const listenR=rnd<.82?R*(.76+Math.random()*.22):rnd<.94?R*(.64+Math.random()*.12):rnd<.98?R*(.52+Math.random()*.12):R*(.40+Math.random()*.12)
    particles.push({ang,dist,listenR,listenAng,x:cx+Math.cos(ang)*dist,y:cy+Math.sin(ang)*dist,sz:.9,ph:Math.random()*Math.PI*2,al:Math.random()*.5+.4})
  }
}
function drawHUD(){
  t+=0.016;ctx.clearRect(0,0,W,H)
  const spd={online:.18,listening:.9,working:1.5,speaking:.65}[jarvisState]||.18
  const rot=t*spd*.35,breathOn=Math.sin(t*(Math.PI*2/4)),breathWrk=Math.sin(t*(Math.PI*2/2.4))
  const bgG=ctx.createRadialGradient(cx,cy,0,cx,cy,W*.5)
  bgG.addColorStop(0,'rgba(0,45,110,.45)');bgG.addColorStop(.65,'rgba(0,12,45,.2)');bgG.addColorStop(1,'rgba(0,4,16,0)')
  ctx.beginPath();ctx.arc(cx,cy,W*.5,0,Math.PI*2);ctx.fillStyle=bgG;ctx.fill()
  const GAP=W*.038,R4=W*.310,R3=R4+GAP,R2=R3+GAP*.5,R1=R2+GAP*1.2
  ctx.save();ctx.translate(cx,cy);ctx.rotate(rot);ctx.globalAlpha=.45;ctx.strokeStyle='#44ccff';ctx.lineWidth=1
  ctx.setLineDash([3,4]);ctx.beginPath();ctx.arc(0,0,R1,0,Math.PI*2);ctx.stroke();ctx.setLineDash([])
  for(let i=0;i<24;i++){
    const a=(i/24)*Math.PI*2,maj=i%6===0,mid=i%2===0,len=maj?11:mid?7:4
    ctx.globalAlpha=maj?.85:mid?.5:.28;ctx.strokeStyle='#44ccff';ctx.lineWidth=maj?1.8:mid?1.2:.8
    ctx.beginPath();ctx.moveTo(Math.cos(a)*R1,Math.sin(a)*R1);ctx.lineTo(Math.cos(a)*(R1+len),Math.sin(a)*(R1+len));ctx.stroke()
  }
  ctx.restore()
  ctx.save();ctx.translate(cx,cy);ctx.rotate(-rot*.5);ctx.globalAlpha=.22;ctx.strokeStyle='#2299dd';ctx.lineWidth=.7
  ctx.setLineDash([2,7]);ctx.beginPath();ctx.arc(0,0,R2,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);ctx.restore()
  const arcSpan=Math.PI*(110/180)
  ctx.save();ctx.translate(cx,cy);ctx.rotate(rot*1.1);ctx.strokeStyle='#44bbee';ctx.lineWidth=1.4;ctx.globalAlpha=.58
  for(let i=0;i<3;i++){const c=(i/3)*Math.PI*2;ctx.beginPath();ctx.arc(0,0,R3,c-arcSpan/2,c+arcSpan/2);ctx.stroke()}
  ctx.restore()
  ctx.save();ctx.globalAlpha=.28;ctx.strokeStyle='#2299cc';ctx.lineWidth=.8
  ctx.beginPath();ctx.arc(cx,cy,R4,0,Math.PI*2);ctx.stroke();ctx.restore()
  particles.forEach(p=>{
    let tx,ty
    if(jarvisState==='online'){const e=1+breathOn*.18;tx=cx+Math.cos(p.ang)*p.dist*e;ty=cy+Math.sin(p.ang)*p.dist*e}
    else if(jarvisState==='listening'){const na=p.listenAng+t*.55;tx=cx+Math.cos(na)*p.listenR;ty=cy+Math.sin(na)*p.listenR}
    else if(jarvisState==='working'){const sc=1+breathWrk*.16;tx=cx+Math.cos(p.ang)*p.dist*sc;ty=cy+Math.sin(p.ang)*p.dist*sc}
    else{const amp=window.JARVIS.audioAmplitude||0,wave=Math.sin(t*4+p.ph*3)*(.07+amp*.35);tx=cx+Math.cos(p.ang+t*.12)*p.dist*(1+wave);ty=cy+Math.sin(p.ang+t*.12)*p.dist*(1+wave)}
    const rdx=tx-cx,rdy=ty-cy,rd=Math.hypot(rdx,rdy)
    if(rd>R4){tx=cx+rdx*(R4/rd);ty=cy+rdy*(R4/rd)}
    p.x+=(tx-p.x)*.07;p.y+=(ty-p.y)*.07
    const d=Math.hypot(p.x-cx,p.y-cy),ctr=Math.max(0,1-d/(R4*.4))
    const al=p.al*(.85+Math.sin(t*.7+p.ph)*.15)+ctr*.12
    if(al<.05)return
    let haloR,haloAl
    if(jarvisState==='working'){const hS=breathWrk*.5+.5;haloR=p.sz*(2+hS*4.5);haloAl=al*(.2+hS*.6)}
    else{haloR=p.sz*2;haloAl=al*.22}
    const gr=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,haloR)
    gr.addColorStop(0,`rgba(0,160,255,${haloAl})`);gr.addColorStop(1,'rgba(0,100,255,0)')
    ctx.beginPath();ctx.arc(p.x,p.y,haloR,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill()
    ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fillStyle=`rgba(245,253,255,${Math.min(1,al*3)})`;ctx.fill()
  })
  const hg=ctx.createRadialGradient(cx,cy,0,cx,cy,W*.025)
  hg.addColorStop(0,'rgba(60,160,255,.15)');hg.addColorStop(1,'rgba(0,80,180,0)')
  ctx.beginPath();ctx.arc(cx,cy,W*.025,0,Math.PI*2);ctx.fillStyle=hg;ctx.fill()
  requestAnimationFrame(drawHUD)
}

async function initSupabase(){
  if(SUPABASE_URL.includes('XXXXXXXXXXXX')){
    setSyncStatus('offline','MODE LOCAL')
    setAuthMsg('Configure tes clés Supabase dans index.html pour activer la connexion.','info')
    loadModulesLocal();renderModules();return
  }
  try{
    const{createClient}=await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm')
    sb=createClient(SUPABASE_URL,SUPABASE_ANON_KEY,{
      auth:{autoRefreshToken:true,persistSession:true,detectSessionInUrl:true,flowType:'implicit'}
    })

    sb.auth.onAuthStateChange(async(event,session)=>{
      if(event==='SIGNED_IN'||event==='TOKEN_REFRESHED'||event==='USER_UPDATED'){
        if(session?.user){
          currentUser=session.user
          hideAuthOverlay()
          if(window.location.hash)window.history.replaceState(null,'',window.location.pathname)
          await loadProfile(currentUser)
          await loadModulesFromCloud(currentUser.id)
        }
      } else if(event==='SIGNED_OUT'){
        currentUser=null;loadModulesLocal()
        renderModules();setSyncStatus('offline','MODE LOCAL')
        showAuthOverlay()
      }
    })

    const{data:{session}}=await sb.auth.getSession()
    if(session?.user){
      currentUser=session.user
      hideAuthOverlay()
      await loadProfile(currentUser)
      await loadModulesFromCloud(currentUser.id)
    } else {
      const hash=window.location.hash
      if(hash&&hash.includes('access_token')){
        setSyncStatus('syncing','CONNEXION...')
      } else {
        loadModulesLocal();renderModules();showAuthOverlay()
      }
    }
  }catch(e){
    console.error('Supabase:',e)
    setSyncStatus('error','ERREUR')
    loadModulesLocal();renderModules();showAuthOverlay()
  }
}

  }catch(e){setSyncStatus('error','ERREUR SYNC');toast('Erreur sync : '+e.message,'error')}

async function pushModulesToCloud(){
  if(!currentUser||!sb)return
  setSyncStatus('syncing','SYNC...')
  try{
    await sb.from('user_modules').delete().eq('user_id',currentUser.id)
    if(MODULES.length){
      const rows=MODULES.map((m,i)=>({user_id:currentUser.id,position:i,name:m.name,icon:m.icon,sub:m.sub||'',content:m.content||'',is_active:m.is_active??true,permissions:m.permissions??{},config:m.config??{},updated_at:new Date().toISOString()}))
      const{error}=await sb.from('user_modules').insert(rows)
      if(error)throw error
    }
    saveModulesLocal();setSyncStatus('ok','EN LIGNE')
  }catch(e){setSyncStatus('error','ERREUR SYNC');toast('Erreur sync : '+e.message,'error')}
}
function debouncedSync(){clearTimeout(syncTimeout);syncTimeout=setTimeout(()=>{if(currentUser&&sb)pushModulesToCloud()},2000)}

window.loadModule=function(e){
  const file=e.target.files[0];if(!file)return
  const reader=new FileReader()
  reader.onload=ev=>{
    const html=ev.target.result,tm=html.match(/<title[^>]*>([^<]+)<\/title>/i)
    const name=tm?tm[1].trim():file.name.replace('.html','')
    const icon=/tjp|trading/i.test(name)?'📈':/rpg|game/i.test(name)?'⚔️':/agenda|cal/i.test(name)?'📅':/jarvis/i.test(name)?'🤖':'📦'
    const mod={name,icon,sub:file.name,content:html,is_active:true,permissions:{},config:{}}
    if(activeSlot!==null)MODULES[activeSlot]=mod;else MODULES.push(mod)
    activeSlot=null;renderModules();debouncedSync();toast('Module ajouté : '+name,'success')
  }
  reader.readAsText(file)
}
window.replaceModule=function(i){activeSlot=i;triggerFilePicker()}
window.removeModule=async function(i){
  const ok=await confirm2('Retirer','Retirer "'+MODULES[i].name+'" ?','Retirer')
  if(!ok)return
  MODULES.splice(i,1);renderModules();debouncedSync();toast('Module retiré','info')
}
window.toggleModuleActive=function(i){
  MODULES[i].is_active=!(MODULES[i].is_active??true)
  renderModules();debouncedSync();toast(MODULES[i].is_active?'Module activé':'Module désactivé','success')
}
window.startSwap=function(i){
  if(swapSource!==null&&swapSource!==i){
    const tmp=MODULES[swapSource];MODULES[swapSource]=MODULES[i];MODULES[i]=tmp
    swapSource=null;renderModules();debouncedSync();toast('Modules échangés','success')
  }else{
    swapSource=i
    document.querySelectorAll('.module-slot.loaded').forEach((s,idx)=>{s.style.outline=idx!==i?'1px dashed rgba(0,170,255,.5)':'1px solid var(--blue)'})
    toast('Clique un autre module pour l\'échanger','info')
  }
}
window.openModule=function(i){
  const m=MODULES[i];if(!m||m.is_active===false)return
  document.getElementById('mf-title').textContent=m.name.toUpperCase()
  const blob=new Blob([m.content],{type:'text/html'})
  document.getElementById('module-iframe').src=URL.createObjectURL(blob)
  document.getElementById('module-frame').classList.add('open')
}
window.closeModule=function(){document.getElementById('module-frame').classList.remove('open');document.getElementById('module-iframe').src='about:blank'}

// ══════════════════════════════════════════════
// IMPORT / EXPORT
// ══════════════════════════════════════════════
window.exportModules=function(){
  const blob=new Blob([JSON.stringify({version:'1.0',exported_at:new Date().toISOString(),modules:MODULES},null,2)],{type:'application/json'})
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='jarvis-modules-backup.json';a.click()
  toast('Export téléchargé','success')
}
window.importModules=function(e){
  const file=e.target.files[0];if(!file)return
  const reader=new FileReader()
  reader.onload=async ev=>{
    try{
      const data=JSON.parse(ev.target.result),mods=data.modules||data
      if(!Array.isArray(mods))throw new Error('Format invalide')
      const ok=await confirm2('Importer','Importer '+mods.length+' modules ?','Importer')
      if(!ok)return
      MODULES=[...MODULES,...mods];renderModules();debouncedSync();toast(mods.length+' modules importés','success')
    }catch(e){toast('Erreur import : '+e.message,'error')}
  }
  reader.readAsText(file);e.target.value=''
}

// ══════════════════════════════════════════════
// DROPDOWN & PARAMÈTRES
// ══════════════════════════════════════════════
window.toggleUserDropdown=function(){document.getElementById('user-dropdown').classList.toggle('open')}
window.closeDropdown=function(){document.getElementById('user-dropdown').classList.remove('open')}
document.addEventListener('click',e=>{if(!document.getElementById('user-btn').contains(e.target))closeDropdown()})
window.openSettings=function(){document.getElementById('settings-panel').classList.add('open')}
window.closeSettings=function(){document.getElementById('settings-panel').classList.remove('open')}
window.saveProfile=async function(){
  if(!currentUser||!sb){toast('Non connecté','error');return}
  const name=document.getElementById('sp-display-name').value.trim()
  if(!name)return
  try{
    await sb.from('profiles').upsert({id:currentUser.id,display_name:name,updated_at:new Date().toISOString()})
    document.getElementById('user-name').textContent=name.toUpperCase().slice(0,12)
    const av=document.getElementById('user-avatar')
    if(!av.querySelector('img'))av.textContent=name[0].toUpperCase()
    document.getElementById('dd-name').textContent=name
    toast('Profil enregistré','success')
  }catch(e){toast('Erreur : '+e.message,'error')}
}
window.forceSync=async function(){
  if(!currentUser||!sb){toast('Non connecté','error');return}
  await pushModulesToCloud();toast('Synchronisation terminée','success')
}

// ══════════════════════════════════════════════
// ONLINE / OFFLINE
// ══════════════════════════════════════════════
window.addEventListener('online',()=>{setSyncStatus('ok','EN LIGNE');if(currentUser&&sb)loadModulesFromCloud(currentUser.id)})
window.addEventListener('offline',()=>{setSyncStatus('offline','HORS LIGNE');toast('Hors ligne — mode local actif','info')})
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&currentUser&&sb)debouncedSync()})

// ══════════════════════════════════════════════
// PONT INTER-MODULES
// ══════════════════════════════════════════════
window.addEventListener('message',e=>{
  const d=e.data;if(!d||!d.type)return
  switch(d.type){
    case 'JARVIS_SET_STATE':if(['online','listening','working','speaking'].includes(d.state))setState(d.state);break
    case 'JARVIS_AUDIO_AMPLITUDE':window.JARVIS.audioAmplitude=Math.max(0,Math.min(1,d.value||0));break
    case 'JARVIS_GET_USER':document.getElementById('module-iframe').contentWindow?.postMessage({type:'JARVIS_USER_INFO',userId:currentUser?.id||null,displayName:currentProfile?.display_name||null,email:currentUser?.email||null},'*');break
    case 'JARVIS_TOAST':toast(d.message||'',d.style||'info');break
  }
})

// ══════════════════════════════════════════════
// PWA
// ══════════════════════════════════════════════
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{})

// ══════════════════════════════════════════════
// DÉMARRAGE
// ══════════════════════════════════════════════
renderModules()
initSupabase()
</script>
</body>
</html>
